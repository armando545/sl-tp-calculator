<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calculadora SL / TP — CFDs</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0F1117; color: #E2E8F0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0F1117; } ::-webkit-scrollbar-thumb { background: #2D3154; border-radius: 3px; }
  .app { max-width: 960px; margin: 0 auto; padding: 24px 16px 48px; }
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: 3px; background: linear-gradient(90deg, #818CF8, #A78BFA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header p { font-size: 12px; color: #475569; margin-top: 5px; letter-spacing: 1px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width: 660px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #1A1D2E; border: 0.5px solid #2D3154; border-radius: 14px; padding: 20px; margin-bottom: 14px; }
  .section-title { font-size: 10px; font-weight: 600; letter-spacing: 2px; color: #6366F1; text-transform: uppercase; margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #94A3B8; margin-bottom: 6px; font-weight: 500; }
  input[type=text], input[type=number], select {
    width: 100%; background: #0D0F1A; border: 0.5px solid #2D3154; border-radius: 8px;
    padding: 9px 12px; color: #E2E8F0; font-size: 13px; outline: none; transition: border-color .2s;
    -webkit-appearance: none; appearance: none;
  }
  input:focus, select:focus { border-color: #6366F1; box-shadow: 0 0 0 2px rgba(99,102,241,0.15); }
  input.err { border-color: #EF4444; }
  .err-msg { font-size: 10px; color: #EF4444; margin-top: 3px; }
  select option { background: #1A1D2E; }
  .dir-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .dir-btn { padding: 9px; border-radius: 8px; border: 0.5px solid #2D3154; background: #0D0F1A; color: #475569; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; transition: all .2s; letter-spacing: 1px; }
  .dir-long { background: #052e16 !important; border-color: #22C55E !important; color: #22C55E !important; }
  .dir-short { background: #2d0c0c !important; border-color: #EF4444 !important; color: #EF4444 !important; }
  .slider-row { display: flex; align-items: center; gap: 10px; }
  .slider-row input[type=range] { flex: 1; accent-color: #6366F1; cursor: pointer; }
  .slider-lbl { font-size: 11px; color: #475569; min-width: 28px; }
  .slider-val { font-size: 13px; font-weight: 600; color: #A78BFA; min-width: 38px; text-align: right; }
  .rr-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
  .rr-btn { padding: 8px 4px; border-radius: 8px; border: 0.5px solid #2D3154; background: #0D0F1A; color: #475569; font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; transition: all .2s; }
  .rr-active { background: #1e1b4b !important; border-color: #6366F1 !important; color: #A78BFA !important; }
  .result-card { background: #1A1D2E; border: 0.5px solid #2D3154; border-radius: 14px; padding: 20px; position: sticky; top: 16px; }
  .res-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid #1e2240; }
  .res-row:last-of-type { border-bottom: none; }
  .res-label { font-size: 12px; color: #64748B; display: flex; align-items: center; gap: 7px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .res-val { font-size: 15px; font-weight: 600; }
  .c-white { color: #E2E8F0; }
  .c-red { color: #EF4444; }
  .c-green { color: #22C55E; }
  .c-blue { color: #818CF8; }
  .c-amber { color: #F59E0B; }
  .c-purple { color: #A78BFA; }
  .c-muted { color: #334155; }
  .lot-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-top: 8px; }
  .lot-box { background: #0D0F1A; border: 0.5px solid #2D3154; border-radius: 8px; padding: 8px; text-align: center; }
  .lot-lbl { font-size: 9px; color: #475569; margin-bottom: 3px; letter-spacing: 0.5px; }
  .lot-val { font-size: 13px; font-weight: 600; color: #818CF8; }
  .summary-box { background: #0D0F1A; border: 0.5px solid #2D3154; border-radius: 8px; padding: 12px; margin: 14px 0; font-size: 11px; color: #64748B; line-height: 1.9; font-family: monospace; white-space: pre-wrap; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
  .btn { padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: 0.5px solid; transition: all .2s; letter-spacing: 0.5px; }
  .btn-copy { background: #1e1b4b; border-color: #6366F1; color: #818CF8; }
  .btn-copy:hover { background: #2d2a6e; }
  .btn-copied { background: #052e16 !important; border-color: #22C55E !important; color: #22C55E !important; }
  .btn-reset { background: #2d0c0c; border-color: #EF4444; color: #EF4444; }
  .btn-reset:hover { background: #3d1212; }
  .tooltip-wrap { position: relative; display: inline-flex; }
  .tip-icon { width: 14px; height: 14px; border-radius: 50%; background: #1e2240; border: 0.5px solid #4A5180; color: #6366F1; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: default; }
  .tooltip { display: none; position: absolute; bottom: 20px; left: 0; background: #1e2240; border: 0.5px solid #4A5180; border-radius: 8px; padding: 8px 10px; font-size: 11px; color: #CBD5E1; width: 210px; z-index: 99; line-height: 1.6; }
  .tooltip-wrap:hover .tooltip { display: block; }
  .lot-section-title { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; color: #6366F1; text-transform: uppercase; margin: 14px 0 6px; }
  .badge { font-size: 10px; background: #1e1b4b; border: 0.5px solid #4338ca; color: #818CF8; border-radius: 20px; padding: 2px 8px; margin-left: 6px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback } = React;

function Tip({ text }) {
  return (
    <span className="tooltip-wrap">
      <span className="tip-icon">?</span>
      <span className="tooltip">{text}</span>
    </span>
  );
}

function getDecimals(type, price) {
  if (type === 'forex') return price < 10 ? 5 : 3;
  if (type === 'crypto') return price > 1000 ? 2 : 4;
  return 2;
}

function calcLotSize(type, riskAmt, slDist, entryPrice) {
  if (!slDist || !riskAmt) return null;
  let std;
  if (type === 'forex') {
    const pipDist = slDist / 0.0001;
    std = riskAmt / (pipDist * 10);
  } else {
    std = riskAmt / slDist;
  }
  return { std, mini: std * 10, micro: std * 100 };
}

export default function App() {
  const [assetType, setAssetType] = useState('forex');
  const [symbol, setSymbol]       = useState('');
  const [entry, setEntry]         = useState('');
  const [direction, setDirection] = useState('long');
  const [atr, setAtr]             = useState('');
  const [atrMult, setAtrMult]     = useState(1.5);
  const [equity, setEquity]       = useState('');
  const [riskPct, setRiskPct]     = useState(1);
  const [rrMode, setRrMode]       = useState(2);
  const [customRR, setCustomRR]   = useState('');
  const [copied, setCopied]       = useState(false);

  const rr = rrMode === 'custom' ? parseFloat(customRR) || null : rrMode;

  const res = useMemo(() => {
    const e = parseFloat(entry);
    const a = parseFloat(atr);
    const eq = parseFloat(equity);
    if (!e || e <= 0 || !a || a <= 0) return null;
    const dec = getDecimals(assetType, e);
    const slDist = a * atrMult;
    const sl = direction === 'long' ? e - slDist : e + slDist;
    const tp = rr ? (direction === 'long' ? e + slDist * rr : e - slDist * rr) : null;
    const riskAmt = eq > 0 ? eq * (riskPct / 100) : null;
    const profitAmt = riskAmt && rr ? riskAmt * rr : null;
    const lots = eq > 0 ? calcLotSize(assetType, riskAmt, slDist, e) : null;
    const sym = symbol || assetType.toUpperCase();
    const dir = direction === 'long' ? 'LONG' : 'SHORT';
    const summary = `${sym} | ${dir} | Entrada: ${e.toFixed(dec)}\nSL: ${sl.toFixed(dec)} | TP: ${tp ? tp.toFixed(dec) : 'N/A'}\nLote: ${lots ? lots.std.toFixed(2)+' std' : 'N/A'} | Riesgo: ${riskAmt ? '$'+riskAmt.toFixed(2) : 'N/A'}${rr ? ' | R:R 1:'+rr.toFixed(1) : ''}`;
    return { e, sl, tp, riskAmt, profitAmt, lots, dec, rr, summary };
  }, [entry, atr, atrMult, direction, equity, riskPct, rr, assetType, symbol]);

  const copy = useCallback(() => {
    if (!res) return;
    navigator.clipboard.writeText(res.summary).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  }, [res]);

  const reset = () => {
    setAssetType('forex'); setSymbol(''); setEntry(''); setDirection('long');
    setAtr(''); setAtrMult(1.5); setEquity(''); setRiskPct(1); setRrMode(2); setCustomRR('');
  };

  const fmt = (n, d) => n !== null && n !== undefined && !isNaN(n) ? n.toFixed(d) : null;

  const Val = ({ v, cls }) => v ? <span className={`res-val ${cls}`}>{v}</span> : <span className="res-val c-muted">—</span>;

  return (
    <div className="app">
      <div className="header">
        <h1>CALCULADORA SL / TP</h1>
        <p>CFDs · GESTIÓN DE RIESGO PROFESIONAL</p>
      </div>

      <div className="grid">
        <div>
          <div className="card">
            <div className="section-title">Datos del Activo</div>

            <div className="field">
              <label>Tipo de activo</label>
              <select value={assetType} onChange={e => setAssetType(e.target.value)}>
                <option value="forex">Forex</option>
                <option value="indices">Índices</option>
                <option value="stocks">Acciones</option>
                <option value="crypto">Criptomonedas</option>
                <option value="commodities">Commodities</option>
              </select>
            </div>

            <div className="field">
              <label>Símbolo / Par</label>
              <input type="text" value={symbol} onChange={e => setSymbol(e.target.value)} placeholder="ej. EURUSD, NAS100, XAUUSD" />
            </div>

            <div className="field">
              <label>Precio de entrada</label>
              <input type="number" value={entry} onChange={e => setEntry(e.target.value)} placeholder="0.00000" step="0.00001" className={entry && (isNaN(parseFloat(entry)) || parseFloat(entry) <= 0) ? 'err' : ''} />
              {entry && (isNaN(parseFloat(entry)) || parseFloat(entry) <= 0) && <div className="err-msg">Ingresa un precio válido</div>}
            </div>

            <div className="field">
              <label>Dirección del trade</label>
              <div className="dir-toggle">
                <div className={`dir-btn ${direction === 'long' ? 'dir-long' : ''}`} onClick={() => setDirection('long')}>▲ LONG</div>
                <div className={`dir-btn ${direction === 'short' ? 'dir-short' : ''}`} onClick={() => setDirection('short')}>▼ SHORT</div>
              </div>
            </div>

            <div className="field">
              <label>ATR actual <Tip text="Average True Range: mide la volatilidad del activo. Búscalo en tu plataforma de charts con el indicador ATR (período 14 recomendado)." /></label>
              <input type="number" value={atr} onChange={e => setAtr(e.target.value)} placeholder="0.0000" step="0.0001" className={atr && (isNaN(parseFloat(atr)) || parseFloat(atr) <= 0) ? 'err' : ''} />
              {atr && (isNaN(parseFloat(atr)) || parseFloat(atr) <= 0) && <div className="err-msg">Ingresa el ATR del activo</div>}
            </div>

            <div className="field">
              <label>Multiplicador ATR: <span className="c-purple" style={{marginLeft:4}}>{atrMult.toFixed(1)}×</span> <Tip text="Cuántas veces el ATR usas como distancia del Stop Loss. Más alto = stop más amplio." /></label>
              <div className="slider-row">
                <span className="slider-lbl">0.5×</span>
                <input type="range" min="0.5" max="3" step="0.1" value={atrMult} onChange={e => setAtrMult(parseFloat(e.target.value))} />
                <span className="slider-lbl">3×</span>
              </div>
            </div>
          </div>

          <div className="card">
            <div className="section-title">Gestión de Riesgo</div>

            <div className="field">
              <label>Equity de la cuenta (USD)</label>
              <input type="number" value={equity} onChange={e => setEquity(e.target.value)} placeholder="10,000" step="100" />
            </div>

            <div className="field">
              <label>% riesgo por operación: <span className="c-purple" style={{marginLeft:4}}>{riskPct.toFixed(1)}%</span> <Tip text="Porcentaje del equity que arriesgas en este trade. Se recomienda entre 0.5% y 2% por operación." /></label>
              <div className="slider-row">
                <span className="slider-lbl">0.5%</span>
                <input type="range" min="0.5" max="5" step="0.1" value={riskPct} onChange={e => setRiskPct(parseFloat(e.target.value))} />
                <span className="slider-lbl">5%</span>
              </div>
            </div>

            <div className="field">
              <label>Ratio Riesgo/Recompensa (R:R)</label>
              <div className="rr-grid">
                {[1,2,3].map(v => (
                  <div key={v} className={`rr-btn ${rrMode === v ? 'rr-active' : ''}`} onClick={() => { setRrMode(v); }}>1:{v}</div>
                ))}
                <div className={`rr-btn ${rrMode === 'custom' ? 'rr-active' : ''}`} onClick={() => setRrMode('custom')}>Custom</div>
              </div>
              {rrMode === 'custom' && (
                <input type="number" value={customRR} onChange={e => setCustomRR(e.target.value)} placeholder="ej. 2.5" min="0.1" step="0.1" style={{marginTop:8}} />
              )}
            </div>
          </div>
        </div>

        <div>
          <div className="result-card">
            <div className="section-title">Resultados</div>

            <div className="res-row">
              <span className="res-label"><span className="dot" style={{background:'#94A3B8'}}></span>Entrada</span>
              <Val v={res ? fmt(res.e, res.dec) : null} cls="c-white" />
            </div>
            <div className="res-row">
              <span className="res-label"><span className="dot" style={{background:'#EF4444'}}></span>Stop Loss</span>
              <Val v={res ? fmt(res.sl, res.dec) : null} cls="c-red" />
            </div>
            <div className="res-row">
              <span className="res-label"><span className="dot" style={{background:'#22C55E'}}></span>Take Profit</span>
              <Val v={res && res.tp ? fmt(res.tp, res.dec) : null} cls="c-green" />
            </div>
            <div className="res-row">
              <span className="res-label"><span className="dot" style={{background:'#F59E0B'}}></span>En riesgo</span>
              <Val v={res && res.riskAmt ? '$'+res.riskAmt.toFixed(2) : null} cls="c-amber" />
            </div>
            <div className="res-row">
              <span className="res-label"><span className="dot" style={{background:'#22C55E'}}></span>Ganancia pot.</span>
              <Val v={res && res.profitAmt ? '$'+res.profitAmt.toFixed(2) : null} cls="c-green" />
            </div>
            <div className="res-row">
              <span className="res-label"><span className="dot" style={{background:'#A78BFA'}}></span>R:R efectivo</span>
              <Val v={res && res.rr ? '1 : '+res.rr.toFixed(1) : null} cls="c-purple" />
            </div>

            <div className="lot-section-title">Tamaño de posición</div>
            <div className="lot-grid">
              <div className="lot-box"><div className="lot-lbl">LOTE STD</div><div className="lot-val">{res && res.lots ? res.lots.std.toFixed(2) : '—'}</div></div>
              <div className="lot-box"><div className="lot-lbl">MINI LOTE</div><div className="lot-val">{res && res.lots ? res.lots.mini.toFixed(2) : '—'}</div></div>
              <div className="lot-box"><div className="lot-lbl">MICRO LOTE</div><div className="lot-val">{res && res.lots ? res.lots.micro.toFixed(2) : '—'}</div></div>
            </div>

            {res && <div className="summary-box">{res.summary}</div>}

            <div className="btn-row">
              <button className={`btn btn-copy ${copied ? 'btn-copied' : ''}`} onClick={copy}>{copied ? '✓ Copiado!' : 'Copiar resumen'}</button>
              <button className="btn btn-reset" onClick={reset}>Resetear</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
